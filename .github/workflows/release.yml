name: release

# Dispara ao dar push numa tag tipo v0.1.0. Builda Windows + Linux e publica
# os instaladores no GitHub Releases automaticamente (via tauri-action).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb appimage"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Instala deps de sistema do Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Cache do Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instala deps do front
        run: pnpm install

      - name: Build + publica no Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ruan ${{ github.ref_name }}"
          releaseBody: |
            Cliente HTTP/API file-based (Tauri v2 + Rust + React), otimizado pro Linux.

            Downloads:
            - Linux: `.AppImage` (portatil) ou `.deb`
            - Windows: instalador `.exe` (NSIS)

            Inclui tambem o servidor MCP `ruan-mcp` para integracao com IAs (ver docs/MCP.md).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
